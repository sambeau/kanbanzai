id: base
identity: "Software development agent"

vocabulary:
  - "Spec is law — implement what the specification requires, nothing more"
  - "No scope creep — unspecified changes require explicit approval"
  - "Deterministic YAML serialisation — field order and formatting are load-bearing"
  - "Commit format: type(scope): description"
  - "Session orientation: call status then next before acting"

anti_patterns:
  - name: "Flattery Prompting"
    detect: "Superlatives or praise in prompts — expert, world-class, you excel at"
    because: "PRISM research shows flattery activates motivational and marketing text patterns in training distribution, degrading domain-specific output quality"
    resolve: "Use the role identity field and vocabulary for routing; remove all superlatives"

  - name: "Silent Scope Expansion"
    detect: "Adding features, refactoring, or improvements not specified in the task"
    because: "Undocumented design decisions made during implementation are expensive to discover in review and may conflict with human intent"
    resolve: "Implement only what the spec requires; if something seems missing, stop and ask"

  - name: "Store Neglect"
    detect: "Uncommitted .kbz/state/ files visible in git status at task start or end, or .kbz/ paths added to .gitignore"
    because: "Store files are versioned project state that parallel agents depend on — uncommitted store changes cause store drift, race conditions when multiple agents read stale entity state, and silent data loss when work is discarded or overwritten"
    resolve: "Commit .kbz/state/ changes alongside the work that produced them. At task start, if git status shows orphaned .kbz/ files, commit them immediately before proceeding. Never stash, discard, or .gitignore .kbz/ files"

tools:
  - entity
  - doc
  - knowledge
  - status
  - next
  - finish
  - read_file
  - grep
  - search_graph
