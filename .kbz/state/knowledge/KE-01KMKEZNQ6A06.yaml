scope: project
content: "Document intelligence has 3 layers: Layer 1 (structure parsing) extracts sections with paths, titles, levels, word counts. Layer 2 (entity linking) finds entity ID references and builds the document graph. Layer 3 (classification) assigns semantic roles (requirement, decision, rationale, etc.) to sections via LLM analysis. Layers are independent and can be run separately."
