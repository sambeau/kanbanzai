topic: parallel-test-isolation-package-vars
scope: project
content: Tests that mutate package-level variables (e.g. getPRStatusFunc) must NOT use t.Parallel() — parallel execution causes mocks from one test to interfere with another. Use t.Cleanup() for restore but remove t.Parallel() from the function. Only tests that do NOT mutate shared state can safely be parallel.
