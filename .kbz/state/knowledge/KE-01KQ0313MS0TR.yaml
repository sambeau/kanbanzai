confidence: "0.5"
content: "Closing a bug that has been stuck in a non-standard terminal state (e.g. cannot-reproduce) requires walking the full lifecycle sequentially — cannot-reproduce → triaged → reproduced → planned → in-progress → needs-review → verified → closed — which took 9 separate entity(action: transition) calls. A bulk-advance capability similar to entity(action: transition, advance: true) on features (which steps through multiple lifecycle states toward a target) would significantly reduce friction for bugs. Worth considering as a future enhancement to the entity tool."
