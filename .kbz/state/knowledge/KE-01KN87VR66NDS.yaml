content: "In a typical agentic setup, creating a GitHub PR is unnecessary overhead. Code reviews are performed by AI reviewer agents working directly on the worktree, not by humans reviewing a GitHub PR. The `pr(action: \"create\")` step in the merge workflow should be treated as optional — skip it when all reviewers are AI agents. A future improvement should make the PR step configurable (e.g. a flag in `.kbz/local.yaml` or project config to opt in/out of GitHub PR creation)."
