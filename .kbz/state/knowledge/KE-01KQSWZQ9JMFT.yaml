content: "tryAutoValidate in doc_tool.go implements per-feature auto-validation cycle tracking. Validation gates on: document type (only spec/dev-plan), tier automation matrix (only auto gates), cycle cap (MaxCycles per tier). Each dispatch increments feature.ReviewCycle. When cycle reaches MaxCycles, the feature is blocked (blocked_reason set) and a checkpoint is created for human escalation. Blocked features are skipped in subsequent validation attempts until the human responds."
