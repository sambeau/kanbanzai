content: "When two parallel features modify the same file (e.g., ws-a sortâ†’slices and ws-b logâ†’slog both touching internal/context/surfacer.go), rebase conflict resolution must preserve BOTH change sets. Strategy: remove the old `log` import, keep the new `slog` import alongside the `slices`/`cmp` imports introduced by the other feature. Verify with `go build ./...` after each conflict marker is resolved before `git rebase --continue`."
