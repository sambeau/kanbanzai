topic: review-bug-filing-policy
scope: project
content: "Reviews and agents should NOT proactively file bug reports for issues they encounter that are outside their current task scope — this is a scope decision for the human. The correct action is to note the issue in the review report (or task completion summary) and let the human decide whether to file a bug. Exceptions: (1) the implement-task skill explicitly requires filing a BUG entity for any intermittent test failure observed during that task's own test run, because the agent has direct evidence and the cost of not recording it is high; (2) if a human explicitly asks the agent to file a bug (as in this case), do so. The default posture is: surface findings, defer filing to the human."
