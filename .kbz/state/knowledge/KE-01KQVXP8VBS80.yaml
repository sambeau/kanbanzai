content: "Fast-track orchestration has model-level behavioral problems: orchestrators stop at implicit gates despite explicit no-gate instructions, treat summary output as pause points, and discover ghost work mid-implementation. P52 defines a lightweight fast-track behavioral profile with session-start audit, no-implicit-gates rules, and continuous-dispatch flow. P51 fixes the pipeline's sub-agent role routing. P44 will automate the fast-track dispatch mode."
