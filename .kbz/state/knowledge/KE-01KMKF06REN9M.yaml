content: "Decomposition best practice: Features should decompose into 8-15 tasks. Fewer than 5 suggests insufficient breakdown; more than 20 suggests the feature is too large or decomposition is too granular. Use slice_analysis to identify vertical slices before decomposing. Each task should be independently testable and deliver a coherent unit of value."
