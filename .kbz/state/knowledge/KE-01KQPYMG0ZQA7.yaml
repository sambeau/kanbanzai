content: "Feature lifecycle has no \"reopen\" path from done back to a working state. Valid transitions from done are only cancelled and superseded. When a feature is closed in error (e.g., overrides claim all tasks done but tasks remain in ready), the only recourse is to supersede it with a new feature. This causes entity ID churn and loses the connection to the original feature's documents. A done→developing or done→reviewing transition (with override required) would handle this case without creating replacement entities. Observed 2026-05-03 with FEAT-01KQ2VHKJB5V8 (B36-F4)."
