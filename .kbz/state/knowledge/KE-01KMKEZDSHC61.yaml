topic: canonical-yaml-field-ordering
scope: project
content: "Entity YAML files MUST be written in canonical field order defined by fieldOrderForEntityType(). This ensures deterministic diffs and clean version control. Field order is: identity fields (id, slug), status/estimate, content fields, relationships, timestamps. Any unrecognized fields are sorted alphabetically after the canonical fields."
