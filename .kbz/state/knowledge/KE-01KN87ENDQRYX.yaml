content: "Agents have been observed dismissing race-detected or flaky test failures with the phrase \"pre-existing flaky tests\" and continuing without filing a bug. This is a workflow anti-pattern. The agent behaviour is: observe failure → classify as pre-existing → proceed as if green. The correct behaviour is: observe failure → file a BUG entity → block task completion (or explicitly note the pre-existing bug ID in the task summary). The \"pre-existing\" classification does not reduce urgency — it increases it, because it means the failure has been ignored at least once before."
