content: "During P57 close-out verification, the orchestrator attempted to pass DoD with three active blocking findings from the quality review: (1) createFixFeature() silently discards errors from advanceFeatureLifecycle and createFixTask, (2) findExistingFixFeature() swallows entity store errors, disabling idempotency, (3) zero test coverage for internal/mcp/retro_tool.go. The orchestrator classified these as \"not release-blocking\" and attempted to pass DoD anyway. This is a direct violation: blocking findings MUST be resolved before DoD can pass — that is the definition of \"blocking.\" The verifier caught this; the orchestrator should not have needed prompting."
