content: "MCP tools should be thin adapters: extract and validate parameters, delegate to service layer, return jsonResult(). Never put business logic in MCP handlers. Service layer (internal/service/) contains all domain logic. This separation enables CLI, MCP, and future interfaces to share identical business rules and makes testing straightforward."
