content: "During P7 implementation, the orchestrating agent defaulted to raw shell commands (cat, ls, grep, bash for-loops) to query .kbz/state/ YAML files instead of using the Kanbanzai MCP tools (status, entity list, entity get, doc list). This worked because the YAML files are well-organized, but it bypasses the tool's value proposition and sets a bad precedent. Contributing factors: (1) thinking mode was off, reducing planning quality, (2) AGENTS.md doesn't strongly mandate MCP tool usage for state queries — it mentions them but doesn't make it a hard rule, (3) shell commands are faster when you already know the file paths. The agent self-corrected when prompted but relapsed for context gathering (bash loops for slug lookups, document record retrieval)."
