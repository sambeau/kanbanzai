content: "TSID13 IDs use a single character prefix (FEAT-, TASK-, BUG-, INC-) followed by 13-character TSID (e.g. FEAT-01KMKA278DFNV). Plans use multi-char prefixes based on registry (e.g. P1-, P2-). All IDs are immutable once created. Slugs are URL-friendly suffixes that aid human readability but are not part of the canonical identifier."
