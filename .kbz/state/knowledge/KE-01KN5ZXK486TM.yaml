content: "[significant] workflow-friction: Commit discipline is not being followed for workflow/management actions (doc registration, feature transitions, state file changes). The kanbanzai-agents skill's commit checklist is only visible when a task is claimed via next(id:...) — sessions that do management work without claiming a task never see it. State changes accumulate silently across a session and are only caught at the start of the next session via the git status pre-task check. Suggestion: Add an explicit 'commit workflow state changes' step to the kanbanzai-agents SKILL.md checklist that covers non-code changes (doc registration, entity transitions, knowledge contributions). Consider adding a note that any tool call writing to .kbz/state/ or .kbz/index/ should be followed by a commit before moving to a different concern."
