content: "Conflict detection (conflict_domain_check) analyzes file overlap and architectural boundary crossing between tasks. Returns per-pair risk (none/low/medium/high) and recommendations (safe_to_parallelise, serialise, checkpoint_required). Use work_queue --conflict-check to annotate ready tasks with conflict risk against active tasks before dispatch. Prevents merge conflicts and rework."
