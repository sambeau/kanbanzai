content: "[moderate] workflow-friction: Shared worktree had unstaged changes from multiple parallel agents (REQ-001 in particular had partial entitySvc.Get changes causing service compile errors). Had to filter error output to confirm context package was clean. git stash/pop during pull-rebase also mixed in other agents' work. Suggestion: When multiple agents share a worktree, each should commit their files before the next agent starts. A worktree-per-task model would eliminate this noise entirely."
