content: "Feature specs that modify .agents/skills/ files should explicitly list the corresponding internal/kbzinit/skills/ embedded copies in their In Scope section and NFR constraints. In P27, the corpus-hygiene spec (FEAT-01KPTHB61WPT0) omitted kbzinit copies from NFR-001's scope, even though the dual-write rule in AGENTS.md requires them. The implementation correctly updated both, but the spec gap means future reviewers cannot cite the spec as authority for the kbzinit requirement. Template addition: whenever a spec lists .agents/skills/kanbanzai-<name>/SKILL.md in scope, it must also list internal/kbzinit/skills/<name>/SKILL.md."
