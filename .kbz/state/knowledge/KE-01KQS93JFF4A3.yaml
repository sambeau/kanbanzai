content: "When a bug transitions to verified status and the fix has been committed and reviewed, close it immediately. Verified bugs that sit open become stale attention items in the status dashboard (like BUG-01KQQ-XFNGEGWQ which sat in verified for a day after fix commit 0dc6fef5). The verified→closed transition has no gate prerequisites — it's a purely administrative step that should follow promptly after verification."
