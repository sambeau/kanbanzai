topic: p7-retro-sub-agent-state-isolation
scope: project
content: "Sub-agents spawned via spawn_agent share the same filesystem and MCP server as the main agent, but they don't share in-session awareness of state changes. When the main agent approves specs and transitions features, those changes exist only on disk (via the MCP server). Sub-agents that then run git operations (stash, checkout, reset) can destroy those changes. The correct mitigation is: (1) commit .kbz/state/ changes before spawning sub-agents, or (2) ensure sub-agents don't run git operations that affect the working tree outside their file scope, or (3) have the main agent re-apply state changes after sub-agents complete. Option 1 is cleanest but requires a workflow state commit step."
