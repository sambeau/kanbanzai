content: "DeepSeek (api.deepseek.com) is a model provider, not a coding-agent platform. It provides an OpenAI/Anthropic-compatible inference API. AGENTS.md is NOT injected automatically — the API has no filesystem awareness. Tool descriptions are NOT injected automatically — the API supports function calling but has no native MCP support; tool schemas must be passed explicitly via the `tools` parameter. When DeepSeek is used as a backend model via a third-party client (e.g., OpenCode), that client's injection behaviour applies, not DeepSeek's. Documented in refs/sub-agents.md under 'Host-specific loading behaviour'."
