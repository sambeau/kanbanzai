content: "Filename consistency across work/ documents is currently enforced by agent discipline alone — there's no deterministic tool that generates the correct path given a document type and optional entity context. Filenames follow patterns like {entity-id}-design-{slug}.md or {entity-id}-{type}-{slug}.md, but variations creep in (e.g. P41-prompt-design-review.md vs. the standard naming). A tool — potentially a 'path' or 'filename' action on the doc tool, or a new utility — that takes type (design, spec, research, prompt, etc.) and an optional Plan/Batch/Feature ID and returns the canonical path would eliminate naming drift. A naming template per document type would be the single source of truth. This would also help with the prompt-file-location problem (KE-01KQQ0MPDMYVV) by encoding the convention in code rather than documentation."
