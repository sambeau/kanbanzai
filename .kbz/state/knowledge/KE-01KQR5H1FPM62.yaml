content: "P48 (Coordination Server) was stuck in \"ready\" status despite all child features being done. There is no direct transition from \"ready\" to \"done\" for strategic plans — you must go ready → active → done. This two-step dance is non-obvious. The system should either allow direct ready→done when all children are complete, or auto-detect that a plan is ready to close and simplify the transition. The status dashboard flagged P48 as \"ready to close\" but provided no action path."
