content: "Research (TASK-01KPR-FD8ZJFXP) found that ad-hoc file-scope discipline breaks down at ~4 parallel features: P3 (8 features) needed 3 'merge main + fix conflicts' commits; P27 (4 features) hit worktree-creation timeouts at 34+ simultaneous worktrees. The conflict tool operates at task level only — no feature-level overlap or drift-age detection. Recommendation: build a cohort model (3–5 features, hard merge gate between cohorts) with three minimal changes: (1) feature-level mode for conflict tool, (2) Merge Schedule section in dev-plan template + decompose warning for plans with 3+ features, (3) Phase 0 cohort-grouping step in orchestrate-development SKILL.md."
