topic: decompose-propose-misleading-fallback-output
scope: project
content: "When decompose propose cannot parse acceptance criteria, its fallback output looks superficially correct (task list, dependency hints, estimates) while being functionally wrong (tasks named \"Implement 1. Purpose\", \"Implement 3. Scope\" etc.). The plausibility of the output makes it easy to miss the warning buried in the proposal object. The fallback should either refuse to produce a proposal (\"cannot decompose — spec not indexed\") or clearly mark every generated task as \"derived from heading, not from AC\" at the task level, not just as a single top-level warning."
