content: "FEAT-01KR7BKXMK3B6 had 8 task state files destroyed by git clean during worktree cleanup. The tasks were \"effectively done\" but tracking was lost. This reveals a fragility: task state lives in the worktree and can be lost if the worktree is cleaned before task state is merged/persisted to the main store."
