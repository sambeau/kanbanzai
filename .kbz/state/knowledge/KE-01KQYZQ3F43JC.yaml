content: "The kbz serve MCP server has no built-in restart mechanism. When a new binary is built (via make install), the running server process must be killed and restarted manually by the human operator. A `kbz server restart` CLI command would let agents reload the server in-band after a build, eliminating the need for human intervention. The server already reads its binary path from the install record and could compare git SHAs to detect staleness."
