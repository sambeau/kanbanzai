content: "Batch P40 (Retrospective Batch — April 2026) was incorrectly set to status \"idea\", which is a plan-level status, not a valid batch lifecycle value. Batches use: proposed → designing → active → reviewing → done. Plans use: idea → shaping → ready → active → done. This was a process error during the plan/batch distinction migration — P40 is a plan whose status should advance through the plan lifecycle, not be treated as a batch. The batch that belongs to P40 (B39, B40, B41, B42) have their own valid batch statuses. Recorded from status health check on 2026-05-01."
