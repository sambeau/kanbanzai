content: "human_checkpoint integrates with review by replacing automated verdict routing when findings are ambiguous (e.g., test adequacy is concern — could be blocking or non-blocking). The orchestrator creates the checkpoint with the ambiguous finding context, halts transitions, and resumes based on the human response. Checkpoint CHK-01KMS1R2689WC demonstrated this pattern for Feature E's test adequacy concern."
