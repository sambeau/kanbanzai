content: "Tool hints in sub-agent prompts no longer require configuration. When MergedToolHints is empty or missing a role, stepResolveToolHint falls back to a hardcoded defaultToolHints map covering implementer-go, architect, and all four reviewer roles. Config still wins per-key. This means handoff prompts always include the Available Tools section with codebase-memory-mcp, kanbanzai_edit_file, search_graph, etc."
