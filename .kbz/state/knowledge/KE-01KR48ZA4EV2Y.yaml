content: "[moderate] workflow-friction: Parallel agents working in the same worktree left uncommitted changes that broke the full test suite compilation (EntityService.Get and Pipeline.Run signature changes without all call-sites updated). Tests for my specific task passed, but the package-level test run reported build failure. Suggestion: When a task changes a widely-used interface signature, it should update all call sites in the same commit rather than leaving them for later. Otherwise parallel agents face unexplained build failures."
