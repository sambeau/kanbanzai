content: "After the P47/B46 unregistered-entity incident, two safeguards were added: (1) copilot-instructions.md now has a \"Verify entity existence before working on it\" critical rule directing agents to call status/entity get before working on any named entity, with P47/B46 as the canonical example; (2) kanbanzai-getting-started skill now includes a \"Verify the entity exists\" checklist item after \"Check the work queue\". Both rules mandate stopping and asking the human if the entity doesn't exist."
