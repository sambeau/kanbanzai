content: "The 45% and 60% context utilisation thresholds in the orchestrator role and skill were calibrated for ~128K-200K token context windows common in early 2025. With 1M token context windows now available, these percentages translate to vastly different absolute capacities: 45% = 450K tokens (vs. 57K-90K originally), 60% = 600K tokens. The thresholds should either be recalibrated for larger windows or expressed as absolute token counts rather than percentages. A 1M window at 45% still has more working room than a 128K window at 90%."
