content: "The orchestrate-development skill is designed for multi-feature, multi-cohort batch orchestration. For fast-track features (small, independent, no review cycles), most of its machinery is irrelevant but still consumes context. P44 should support a fast_track dispatch mode with lightweight orchestration profile. The orchestrator received identical knowledge entries across 12 next calls — context assembly is per-task-claim, not per-session. P44's dispatch_task should maintain session-scoped context."
