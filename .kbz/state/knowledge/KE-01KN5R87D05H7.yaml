topic: aci-description-patterns
scope: project
content: "The most effective ACI description patterns for MCP tools are: (1) explicit negative guidance (INSTEAD OF / Do NOT) naming the specific wrong tool, (2) bidirectional cross-referencing between related tools (each pointing to the other), (3) workflow sequencing (Call AFTER X, BEFORE Y), (4) mode documentation (When id is provided... When id is omitted...). These patterns eliminated all ambiguity in agent-driven testing across all 22 tools."
