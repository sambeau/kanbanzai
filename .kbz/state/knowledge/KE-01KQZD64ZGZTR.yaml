content: "The fast-track pipeline failed again on 2026-05-06: it hit a gate where there shouldn't have been one. The orchestrator stopped at a milestone transition (batch complete or feature transition) when it should have continued. This is the same implicit-gate pattern that P50 exhibited and which P52 is designed to fix. Reinforces the need for the fast-track orchestration profile — the behavioural instruction isn't strong enough to override the training-data pattern of \"summary output → wait for response\"."
