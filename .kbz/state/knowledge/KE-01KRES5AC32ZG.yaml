content: "When a feature branch diverges from main (e.g., after parallel feature merges), always rebase onto the LOCAL main tip, not just origin/main. The merge gate's conflict check compares against local main. Rebasing onto origin/main when local main has unsynced merge commits will still fail the gate with \"branch has merge conflicts with main\" even if there are no textual conflicts."
