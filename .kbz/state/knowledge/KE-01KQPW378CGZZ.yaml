content: "When creating plan entities via the entity tool, also create a human-readable document in the plan's work/ folder (e.g. work/P41-opencode-ecosystem-features/P41-design-opencode-ecosystem-features.md). The entity YAML in .kbz/state/plans/ is agent-friendly but humans need a readable file they can open. Follow the canonical filename template: {PlanID}-{type}-{slug}.md. Register with doc(action: register). Consider whether the entity tool should auto-generate a scaffold document when creating plans."
