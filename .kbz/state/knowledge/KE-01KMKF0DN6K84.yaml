content: "Dependency management: Tasks default to 'queued' status. Use depends_on to declare explicit dependencies. StatusTransitionHook automatically promotes blocked→ready when dependencies reach terminal states (done, not-planned, duplicate). work_queue returns ready tasks sorted by estimate (ascending) then age (descending). This enables predictable, dependency-respecting execution order."
