topic: git-commit-message-format
scope: project
content: "Git commit messages follow conventional format: 'type(scope): description'. Types: feat, fix, docs, test, refactor, chore. Scope identifies affected component (e.g., entity, mcp, storage, cli). Keep first line under 72 chars. Body (optional) explains why, not what. Reference entity IDs in footer (e.g., 'Refs: FEAT-01KM..., TASK-01KM...')."
