content: "decompose propose falls back to one-task-per-section-header generation when the document intelligence index has not yet processed a newly registered spec. The warning message \"No acceptance criteria found in spec\" is ambiguous — it conflates \"the spec has no ACs\" (content problem) with \"the index cannot see the ACs yet\" (infrastructure problem). Root cause: spec files registered in the same session are in .kbz/state/documents/ but may not yet be in .kbz/index/. Workaround: call index_repository before decompose propose whenever specs were written in the same session. Fix direction: decompose should read spec content directly from disk as a fallback when the index returns empty content, or emit a clearer \"spec not yet indexed\" diagnostic instead of the generic AC-not-found warning."
