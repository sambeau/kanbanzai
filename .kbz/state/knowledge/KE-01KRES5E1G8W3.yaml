content: "After a squash merge, the merge tool emits a warning: \"branch is not an ancestor of main (merge-base check failed). Worktree left active\". This is a known false positive with squash strategy — squash creates a new commit that is not a direct ancestor of the feature branch. The merge succeeds; the worktree can be safely removed after confirming `go build ./...` and `go test ./...` pass on main."
