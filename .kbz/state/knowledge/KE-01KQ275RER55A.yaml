topic: short-plan-identifiers-in-agent-workflows
scope: project
content: "Agents cannot use shortened references like \"P30\" with `status(id: ...)` or `entity(action: \"get\", id: ...)` because those tools require canonical entity IDs such as `P30-handoff-skill-assembly-prompt-hygiene`. This creates friction in human-agent collaboration because humans naturally use the short form. The system should support resolving shortened plan identifiers like `P30` to the canonical plan ID in agent-facing workflows."
