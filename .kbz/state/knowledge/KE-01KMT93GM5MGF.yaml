topic: p7-retro-git-stash-destroys-mcp-state
scope: project
content: "During P7 implementation, a sub-agent followed AGENTS.md instructions to \"stash uncommitted changes before starting new work.\" The stash captured .kbz/state/ changes made by MCP tool calls (doc approve, entity transition, next) from the main agent, reverting feature statuses from developing→specifying, spec statuses from approved→draft, and task statuses from ready→queued. The stash was never popped, so the state was permanently lost. Root cause: .kbz/state/ is tracked in git for this project, MCP tool calls modify these files without committing, and the AGENTS.md stash instruction doesn't exclude .kbz/state/. The main agent's in-session explanation (\"stale MCP binary\" / \"sub-agents writing state\") was wrong — it was the git stash that caused the reversion."
