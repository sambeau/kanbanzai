content: "wrapWithRecovery in internal/mcp/handler.go is the canonical panic recovery wrapper for MCP handlers. It is applied as the outermost layer in wrapAllTools (server.go) wrapping hook.Wrap. Recovery converts panic to ActionError with code 'internal_panic'. ActionError (sideeffect.go) produces the standard 2.0 JSON error shape used across all MCP tools."
