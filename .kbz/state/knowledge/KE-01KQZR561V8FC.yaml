content: "Never normalise or defer a large failing test suite as \"pre-existing\" without explicit tracking. When full-suite failures are discovered, create or link bugs/incidents, record the failing packages and counts, and keep them visible until they are fixed; 60+ failing tests is a release-blocking disaster, not background noise."
