content: "Error handling convention: service layer returns (result, error). MCP tools convert errors to mcp.NewToolResultError() or mcp.NewToolResultErrorFromErr(). Never panic. Use fmt.Errorf(\"context: %w\", err) for error wrapping. CLI commands print error.Error() to stderr and return non-zero exit code. No stack traces to end users."
