content: "Prompt files (like bootstrapping-gap-audit-prompt.md) are currently saved to ad-hoc locations because there is no defined convention for where standalone prompts belong. The work/ directory has design/, spec/, plan/, research/, reviews/ — but prompts don't cleanly fit into any of these. This causes prompts to be scattered based on individual judgment. Consider either a dedicated work/prompts/ directory, a *.prompt.md naming convention, or a rule that prompts go in the directory matching the stage they serve. Also consider adding a 'prompt' document type to the doc tool for registration and discovery."
