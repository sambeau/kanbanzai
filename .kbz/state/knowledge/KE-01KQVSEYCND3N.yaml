content: "The handoff MCP tool had dual context-assembly paths (3.0 pipeline and legacy 2.0 fallback). The fallback silently degraded sub-agent prompts — no role, skill, vocabulary, or code graph context. Additionally, orchestrators could bypass handoff entirely and compose prompts manually. P51 removes the legacy fallback. P44 (model routing) will make pipeline enforcement non-bypassable via dispatch_task."
