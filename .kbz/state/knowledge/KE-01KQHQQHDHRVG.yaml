content: "Tasks/features showing as \"done\" via entity(get) but still appearing as \"ready\" or \"reviewing\" in list/status dashboards. Root cause: finish() writes task status to the entity YAML store and SQLite cache, but the status dashboard and task-queue (next()) appear to read from a cached index that isn't reliably invalidated after write-through. Specific examples: TASK-01KQG2WT3GC31 shows status:done via get but status:ready via list; FEAT-01KQG2Q5MDC6E and FEAT-01KQG2Q5Q1HX9 show status:done via get but status:reviewing via list. The write-through pattern in finish() (CacheRefresh) needs to also refresh whatever the list/queue query uses, or the list/queue query needs to bypass cache for status fields. Without this, every override transition and finish() call risks leaving \"detritus\" where the source of truth is done but the index disagrees."
