content: "FastTrackConfig.Enabled uses *bool (pointer to bool) to distinguish 'not configured' (nil → defaults to true) from 'explicitly disabled' (&false). This follows the same pattern as MergeConfig.RequireGitHubPR. IsEnabled() helper returns true when Enabled is nil. mergePhase4bDefaults only fills Enabled when nil, preserving explicit false values."
