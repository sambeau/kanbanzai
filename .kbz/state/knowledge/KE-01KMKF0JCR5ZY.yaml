content: "Worker review (review_task_output) is advisory at Tier 2. Failed reviews transition tasks to needs-rework with recorded reason. Passed reviews transition to needs-review for human gate. Review never auto-reverts work or bypasses human sign-off. Spec-level checks are heuristic (warnings only); task-level checks (missing files, unmet verification) are blocking (errors)."
