content: "When writing retrospective or review documents, agents must call `retro synthesise` for the relevant scope AND `knowledge list` with tags like retrospective, workflow-friction before composing the document. During P7, the agent wrote the entire retrospective from in-session memory, missing: (1) a P6 friction signal that directly motivated the server_info feature (cross-plan learning), (2) a doc-approve Status-header friction entry, and (3) the fact that zero finish calls included retrospective signals. The retro and knowledge tools contain accumulated project learning that in-session memory does not. The same bypass-MCP-tools habit that affected state queries also affected document authoring."
