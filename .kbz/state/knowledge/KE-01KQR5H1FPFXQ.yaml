content: "P40 (Retrospective Batch — April 2026) was already in \"done\" status but the status dashboard reported it as \"idea\" and flagged it with \"ready to close\" attention. Root cause: the plan had a status of \"done\" at the entity level, but the dashboard classification logic misclassified it — likely because the entity type resolution fell back to batch defaults when the plan had child batches. Symptom: health errors \"unknown batch status 'idea'\" appeared for P40 even though its actual entity status was \"done\"."
