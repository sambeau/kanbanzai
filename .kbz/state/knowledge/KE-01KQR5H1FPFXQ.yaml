content: "Strategic plans have \"done\" as their terminal state — there is no \"closed\" transition. The status dashboard persistently flags done plans (P40, P48) as \"ready to close\" attention items, but this is noise: no further action is possible. P40 was doubly misclassified earlier — the dashboard reported it as \"idea\" despite entity status being \"done\", producing phantom health errors. Root cause: the plan status resolution logic falls back to batch defaults when a plan has child batches. Two symptoms from the same root cause: (1) done plans show as \"ready to close\" attention items perpetually, (2) some done plans were misclassified as \"idea\" producing bogus health errors. Fix: the dashboard should suppress attention items for plans in terminal state, and the classification logic should correctly resolve plan statuses."
