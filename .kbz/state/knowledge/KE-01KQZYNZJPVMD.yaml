confidence: "0.5"
content: "Always create the worktree BEFORE editing any files. Editing on main first and then copying to the worktree risks collisions with other parallel agents. The correct sequence is: (1) create worktree, (2) apply edits in the worktree, (3) test and commit on the worktree branch. Never edit on main for entity-scoped work."
