content: "When MCP tool calls fail with errors about unknown states or type mismatches, check whether the running server binary predates the code changes. Use `ps aux | grep kanbanzai` to find the binary path and `ls -la` to check its timestamp. The binary at ~/go/bin/kanbanzai is installed via `go install` and must be explicitly rebuilt after code changes."
