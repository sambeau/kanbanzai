content: "Retrospective entries should record the plan version context to distinguish active bugs from already-fixed ones. Convention: (1) \"First seen: PNN\" — the plan sprint when the issue was first observed. (2) \"Fixed in: PNN\" — the plan that resolved it, with a note on whether it requires a binary rebuild or takes effect from the repo immediately (SKILL.md / doc changes need no rebuild; Go code changes do). Use the installed binary's git SHA from server_info to cross-check which plan's Go code is actually live. The install record's git_sha field is the source of truth; compare against known merge-commit SHAs for each plan to determine what's in the binary vs what's only in the repo."
