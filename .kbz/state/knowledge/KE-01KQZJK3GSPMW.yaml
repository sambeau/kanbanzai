confidence: "0.5"
content: "\"Pre-existing\" test failure is not a valid category. A failing test is a failing test — it means someone didn't run tests before merging. Policy should be: tests must pass before any work commences. If tests are failing on main, the first task is to fix them. No new work should start until the test suite is green."
