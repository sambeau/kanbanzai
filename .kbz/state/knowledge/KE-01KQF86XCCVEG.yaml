content: "Advancing a bug through its full lifecycle requires an excessive number of sequential MCP tool calls — each transition is a separate entity(action: \"transition\") call. Closing BUG-01KQB-54280HDP required 7 calls: triaged → planned → in-progress → needs-review → verified → closed, plus a cleanup call. Each call is a round-trip with validation. An \"advance\" or \"fast-forward\" mode that chains valid transitions to a target state would reduce this to a single call. The entity tool already has an \"advance\" parameter for features; extending it to bugs and other entity types, or adding a general-purpose transition-chaining capability, would eliminate this friction. Alternatively, a \"close\" action that auto-advances through the required intermediate states could make the common case (bug fixed → close) a single call."
