content: "Research and design documents should be stored with their parent plan, not in separate top-level folders. The pattern is work/{plan-slug}/{plan-id}-{type}-{topic}.md (e.g., work/P41-opencode-ecosystem-features/P41-research-context-compaction.md). The work/research/ folder has been emptied and should not be used for new documents. Each plan folder is self-contained — all research, design, specs, and dev-plans for a plan live together."
