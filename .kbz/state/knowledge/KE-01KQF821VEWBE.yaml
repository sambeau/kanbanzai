content: "Bugs are frequently fixed without advancing their lifecycle state beyond \"reported.\" The fix is committed to main, but the bug entity stays in reported/triaged status indefinitely. This creates stale entity state, misleading health dashboards (showing open critical bugs that are already fixed), and stalled-task attention items. The same pattern affected BUG-01KQB-54280HDP (fixed in fc749adf, only closed days later when explicitly asked). Root cause: the workflow does not require or prompt bug lifecycle advancement after a fix commit; agents treat the commit as the closure signal rather than advancing the entity."
