content: "Bugs are frequently fixed without advancing their lifecycle state. The fix is committed to main, but the bug entity stays in a stale status indefinitely. This creates misleading health dashboards (showing open critical bugs that are already fixed) and stalled-task attention items.\n\nConfirmed instances:\n- BUG-01KQB-54280HDP: fixed in fc749adf, left in reported; only closed days later when explicitly prompted.\n- BUG-01KQF4CEB8Z90: fixes landed in main via an unrelated refactor commit (8167b8ea); bug was left stranded at `needs-review` with an empty worktree branch. Required manual `verified → closed` transition after the fact.\n\nRoot cause: workflow does not require or prompt bug lifecycle advancement after a fix commit. Agents treat the commit as the closure signal rather than advancing the entity. Additionally, when a fix lands as a side effect of another commit, there is no mechanism to detect and close the associated bug.\n\nSuggested remedy: add a post-commit or post-merge hook reminder to check for open bugs whose symptoms match the changed files, and require explicit lifecycle advancement as part of the fix task's `finish` call."
