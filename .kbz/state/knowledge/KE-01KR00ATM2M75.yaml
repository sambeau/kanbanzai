content: "Writing feature design/spec/dev-plan documents to the main repo work/ directory without an active worktree risks corruption and bypasses the entity-worktree binding. Always create a worktree via worktree(action: \"create\", entity_id: \"FEAT-...\") before writing any feature-owned files. The worktree isolates the feature's working directory and prevents accidental writes to main."
