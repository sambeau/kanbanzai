topic: p19-c4-standalone-bug-gap
scope: project
content: P19 spec C4 (bug warnings in status) only surfaces open high/critical bugs that are linked to an in-flight feature. Standalone bugs — those not attached to any feature — are not covered. This means a high-severity bug filed against a general code area (e.g. a race condition in the build info package) will remain invisible in all status outputs even after P19 ships. The original design intent included standalone bugs as a first-class concept; this gap appears to be an oversight in the C4 wording rather than a deliberate decision. Needs review before P19 is closed.
