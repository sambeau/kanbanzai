content: "Multi-feature review works by: (1) entity list status=reviewing to find targets, (2) independent parallel review cycles per feature, (3) per-feature review documents registered with doc(register), (4) independent verdict routing — each feature transitions independently based on its own findings. State is never shared between feature review cycles."
