summary: "Close the review workflow gap and detect documentation drift. Three coordinated improvements: (A) plan-level review SKILL to capture the improvised review procedure as a repeatable checklist routed through Kanbanzai tools; (B) review tasks as first-class workflow entities so reviews get context assembly, nudges, and retro signal capture; (C) documentation currency health check to detect stale tool references in SKILL files and missing AGENTS.md updates after plan completion. Motivated by post-P9 feedback analysis (work/research/post-p9-feedback-analysis.md)."
