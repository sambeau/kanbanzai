id: B19-workflow-lifecycle-integrity
slug: workflow-lifecycle-integrity
name: Workflow lifecycle integrity
status: done
summary: "Make entity lifecycle state self-consistent and observable without requiring explicit health checks. Three coordinated pillars: (1) lifecycle gates — prevent features and plans from being closed while children are still open; (2) auto-advance — when all child tasks reach terminal state, automatically move the parent feature forward; mirror at plan level; (3) proactive status — upgrade the attention system from plain strings to structured items and surface health findings directly in status responses so a single status call gives a complete picture."
