id: BUG-01KQR5XA77Y49
slug: status-dashboard-plan-batch-misclassification
name: Plan-to-batch misclassification in status dashboard
status: reported
severity: medium
priority: medium
type: implementation-defect
reported_by: sambeau
reported: "2026-05-04T00:23:48Z"
observed: "8 health errors: \"unknown batch status 'idea'\" for P40, P48 and \"unknown batch status 'shaping'\" for P41-P46. These are strategic-plan entities with valid plan lifecycle statuses. The status dashboard also flags P40 and P48 as \"ready to close\" when they are already in \"done\" status."
expected: "Strategic plans should be classified by their own type and validated against the plan lifecycle statuses (idea → shaping → proposed → ready → active → done). They should not be validated against batch statuses. Done plans should not appear in \"ready to close\" attention items."
