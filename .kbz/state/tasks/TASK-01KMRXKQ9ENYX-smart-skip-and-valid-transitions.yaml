completion_summary: "Implemented smart-skip stop at `reviewing`, verified `ValidNextStates` includes new states, and confirmed error messages include valid alternatives.\n\n**1. Smart-skip stops at `reviewing` (AC-16, AC-17, AC-18):**\n- Added `reviewing` to `featureForwardPath` between `developing` and `done` in `advance.go`\n- Introduced `advanceStopStates` map — `reviewing` is a mandatory gate state\n- Modified advance loop: when encountering a stop state, advance transitions INTO it (no prerequisite check) then halts. This ensures `reviewing` is entered but never auto-transitioned through.\n- Removed the old special-case `done` target checking the \"reviewing\" gate (superseded by the stop-state mechanism)\n\n**2. ValidNextStates includes new states (AC-11, AC-12, AC-13):**\n- Already correct in `lifecycle.go` (from the parallel task adding the states). Added explicit test cases:\n  - AC-11: `developing` → includes `reviewing` ✓\n  - AC-12: `reviewing` → includes `done`, `needs-rework` ✓\n  - AC-13: `needs-rework` → includes `developing`, `reviewing` ✓\n\n**3. Error messages include valid next states (AC-14, AC-15):**\n- Already implemented in `ValidateTransition` — when a transition is invalid, the error includes `valid transitions from \"X\": a, b, c`. Added AC-14 test: `developing → done` error names `reviewing`.\n\nAll tests pass with `-race` across service, validate, and mcp packages."
