completion_summary: "Updated health check and merge gate logic so `reviewing` and `needs-rework` are correctly treated as non-terminal, non-early feature states.\n\n**Findings:**\n1. `IsTerminalState` already correctly classifies `reviewing` and `needs-rework` as non-terminal (only `superseded`/`cancelled` are terminal for features). Added explicit test cases.\n2. Health checks already correct — `reviewing`/`needs-rework` are not in `featureTerminalOrDone` (no false \"done with non-terminal children\" warning) nor in `featureEarlyStatuses` (no false \"early state with all terminal children\" warning). Added test coverage.\n3. Merge gates had NO entity status check — a feature in `reviewing` could theoretically pass all gates. Added `EntityDoneGate` that requires feature status `done` (or bug status `closed`) before merge is allowed. This is a blocking gate, first in evaluation order.\n\n**AC satisfaction:**\n- AC-19: `reviewing` classified as non-terminal ✅ (test added)\n- AC-20: `needs-rework` classified as non-terminal ✅ (test added)\n- AC-21: Merge gate requires `done` — `reviewing` does not satisfy it ✅ (new `EntityDoneGate`)\n- AC-22: Health checks produce no false warnings for `reviewing`/`needs-rework` ✅ (tests added)"
