summary:
  "1.0 robustness: human-readable error messages throughout, clean-machine
  testing, edge case handling in init (non-git dir, existing .kbz, conflicting .skills,
  no write permission), CLI help text, and partial state recovery. Also: doc_record_refresh
  tool to update a registered document's hash after editing (without re-registering);
  MCP tool safety annotations (readOnlyHint, destructiveHint, idempotentHint) on all
  kanbanzai tools so MCP clients can make informed auto-approval decisions — tools
  that only write to .kbz/ should be auto-approvable without user confirmation."
