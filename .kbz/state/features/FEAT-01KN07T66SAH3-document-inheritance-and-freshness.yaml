slug: document-inheritance-and-freshness
parent: P13-workflow-flexibility
status: proposed
summary: "Plan-level documents should satisfy feature-level doc gap checks — a feature belonging to a plan with an approved spec should not show as missing a spec. Reduces false-positive health warnings that degrade the health signal. Also clarify the relationship between registered doc records and filesystem content: auto-refresh on access, or surface a warning when content hashes are stale."
