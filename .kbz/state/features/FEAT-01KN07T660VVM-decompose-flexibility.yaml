summary: "Let decompose parse acceptance criteria from any structured format — tables, numbered lists, Given/When/Then blocks — not just - [ ] checkboxes. Also address decomposition granularity: one-AC-per-task produces too many tasks for tightly coupled criteria. Explore task grouping or smarter merging of related ACs into implementation units."
