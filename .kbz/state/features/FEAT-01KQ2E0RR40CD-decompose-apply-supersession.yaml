slug: decompose-apply-supersession
name: Decompose Apply Supersession
parent: P34-agent-workflow-ergonomics
status: dev-planning
summary: "Before creating new tasks in decompose(apply), transition all existing queued tasks for the feature to not-planned. Protect tasks in any other status (ready, active, done, etc.) and surface a warning when in-progress tasks are preserved. Report superseded_count in the response. Makes the decompose-apply cycle idempotent: running it three times on a feature produces exactly one queued task set."
