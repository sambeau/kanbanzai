summary: "Audit all MCP parameter structs that (a) have yaml: tags and (b) are decoded from JSON tool parameters via json.Unmarshal. Any exported field missing an explicit json: tag is a silent deserialization vulnerability — the same class of bug as the Classification struct fix in the Layer 3 pilot. Add a Go test or go vet check to prevent regression. Classification and ConceptIntroEntry are already fixed; this audits the remainder."
