summary: "Return the assembled context packet (with reclaimed: true) instead of an error when next(id: TASK-...) is called for a task already in active status. Preserves the existing dispatch metadata unchanged. Recovers gracefully from timeout-induced double-claims without introducing a new tool action or response variant."
