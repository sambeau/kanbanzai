summary: "Implement --format plain and --format json for kbz status. Plain: stable key:value output for shell scripts and pre-commit hooks, including the registered:false key for unregistered documents. JSON: results-array wrapper for entity/document queries (forward-compatible with multi-target); distinct scope:project shape for project overview with summary counts and no full feature list. Schema must be stable within a major version."
