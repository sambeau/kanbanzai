summary: "Three related enhancements to the doc_intel guide response. (1) Embed the full role taxonomy and valid confidence values in the guide response so classify calls are self-contained without needing the skill file (§5.2). (2) Include section count or size bucket per document in the pending response to enable right-sized batch planning (§5.1). (3) Add suggested_classifications to the guide response for sections where heading pattern gives unambiguous high-confidence role assignment, reducing read_file calls (§5.3). Sources: Pilot §5.1, §5.2, §5.3."
