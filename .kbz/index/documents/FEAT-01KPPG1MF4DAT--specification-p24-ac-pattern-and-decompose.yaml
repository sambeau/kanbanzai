    - section_path: "1.1"
      role: rationale
      confidence: high
      summary: 'Layer A: extractConventionalRoles uses heading keywords only, missing sections with non-standard headings but AC body content. Layer B: parseSpecStructure and asmExtractCriteria regexes require line to begin with ** but list-item form starts with - causing match failure.'
      concepts_intro:
        - name: heading-based-role-assignment
          aliases:
            - conventional-role-extraction
            - layer-2-classification
        - name: parse-spec-structure
          aliases:
