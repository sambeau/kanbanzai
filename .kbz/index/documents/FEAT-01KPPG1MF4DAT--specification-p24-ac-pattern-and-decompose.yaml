        - name: asm-extract-criteria
          aliases:
            - asmExtractCriteria
            - assembly-criteria-extraction
    - section_path: "1.2"
      role: constraint
      confidence: high
      summary: 'In scope: content-based AC detection in extractor, acBoldIdentLineRe regex, list-item fix in parseSpecStructure and asmExtractCriteria, buildZeroCriteriaDiagnostic helper, three verify-then-fix tests. Out of scope: non-standard bold variants, sequential validation, persistence changes, decompose review/apply changes, new FragmentRole constants, Layer 3 reclassification.'
    - section_path: 1.2.1
      role: constraint
      confidence: high
      summary: 'In scope items: content param on extractConventionalRoles, acBoldIdentLineRe, content scan for unassigned sections, list-item fixes in parseSpecStructure and asmExtractCriteria, three verify-then-fix tests.'
    - section_path: 1.2.2
      role: constraint
      confidence: high
      summary: 'Out of scope: non-standard bold variants, sequential/duplicate validation, persistence changes, decompose review/apply, new FragmentRole constants, Layer 3.'
    - section_path: "1.3"
      role: constraint
      confidence: high
      summary: 'Constraints: DEP-001 FEAT-01KN4ZPCMJ1FP and DEP-002 FEAT-01KMT must be merged; Section.ByteOffset and ByteCount populated by Layer 1 parser; ASM-001/ASM-002 on bold-pattern and RFC 2119 keyword definitions.'
    - section_path: "1.4"
      role: requirement
      confidence: high
      summary: '12 functional requirements: content param on extractConventionalRoles, acBoldIdentLineRe package-level regex matching bare and list-item forms, content-scan for unassigned sections at medium confidence, no-duplicate guard, list-marker stripping in parseSpecStructure and asmExtractCriteria, canonical XX-NN:text output, buildZeroCriteriaDiagnostic helper with section count/titles/bold counts/remediation, three verify-then-fix tests. NFRs: deterministic (no LLM), ByteOffset/ByteCount bounds, existing tests pass, heading roles high/content-based roles medium.'
      concepts_intro:
        - name: acBoldIdentLineRe
          aliases:
            - ac-bold-ident-regex
            - bold-identifier-regex
        - name: build-zero-criteria-diagnostic
          aliases:
