            - zero-criteria-error-helper
    - section_path: "1.5"
      role: requirement
      confidence: high
      summary: '8 acceptance criteria: non-AC-headed section with AC body gets requirement/medium, no duplicate from content scan, regex matches bare and list-item not single-asterisk, parseSpecStructure extracts canonical criteria, asmExtractCriteria emits canonical without bold markers, rich diagnostic with bold-outside count, all three verify-then-fix tests pass.'
