    - section_path: "1"
      role: narrative
      confidence: high
      summary: 'Specification for lightweight access-tracking instrumentation on doc_intel and knowledge systems: access counters on DocumentIndex and KnowledgeRecord, sort-by-recent on knowledge list, and a Most Accessed Documents audit table.'
      concepts_intro:
        - name: access-instrumentation
          aliases:
            - access-tracking
            - usage-instrumentation
        - name: recent-use-count
          aliases:
            - rolling-30-day-count
            - access-counter
        - name: document-index-access-count
          aliases:
            - DocumentIndex.AccessCount
            - doc-level-counter
    - section_path: "1.1"
      role: rationale
      confidence: high
      summary: Adds last_accessed_at and recent_use_count to knowledge entries and access_count/last_accessed_at to document/section index records; sort:recent on knowledge list; Most Accessed Documents audit table. Counter writes are lazy and approximate.
      concepts_intro:
        - name: lazy-counter-write
          aliases:
            - deferred-flush
            - background-counter-flush
        - name: approximate-counter
          aliases:
            - approximate-access-count
            - best-effort-counter
    - section_path: "1.2"
      role: definition
      confidence: high
      summary: Maps design document file path references to actual Go file paths in the codebase for each modified file.
    - section_path: "1.3"
      role: constraint
      confidence: high
    - section_path: 1.3.1
      role: constraint
      confidence: high
      summary: 'In scope: recent_use_count and last_accessed_at on KnowledgeRecord; sort:recent on KnowledgeService.List; AccessCount and LastAccessedAt on DocumentIndex; per-section SectionAccessInfo; increments in GetOutline, guide, GetSection, find, Search; lazy counter writes; MostAccessed audit report extension.'
      concepts_intro:
        - name: section-access-info
          aliases:
            - SectionAccessInfo
            - per-section-access-data
        - name: knowledge-record-fields
          aliases:
            - KnowledgeRecord.Fields
            - knowledge-entry-fields
    - section_path: 1.3.2
      role: constraint
      confidence: high
      summary: 'Out of scope: per-agent attribution, query content logging, latency measurement, skill file changes, corpus onboarding, classification trigger changes, SQLite counter storage.'
    - section_path: "1.4"
      role: requirement
      confidence: high
    - section_path: 1.4.1
      role: requirement
      confidence: high
      summary: 'FR-001 through FR-008: new recent_use_count and last_accessed_at fields on KnowledgeRecord; Get and List increment both fields best-effort; rolling 30-day window via lazy decay; sort:recent on KnowledgeFilters/KnowledgeService.List; recent_use_count in list output; sort exposed through MCP knowledge tool.'
      concepts_intro:
        - name: knowledge-base-instrumentation
          aliases:
            - knowledge-access-tracking
        - name: sort-recent
          aliases:
            - sort-by-recent
            - descending-recent-use-count
    - section_path: 1.4.2
      role: requirement
      confidence: high
      summary: 'FR-009 through FR-018: AccessCount and LastAccessedAt fields on DocumentIndex; SectionAccessInfo type with per-section counters; increments in GetOutline, guide, GetSection (document and section level), FindByEntity/Concept/Role (all result documents), Search (all result documents); lazy counter writes; backward-compatible YAML with omitempty.'
      concepts_intro:
        - name: document-intelligence-instrumentation
          aliases:
            - doc-intel-access-tracking
            - intelligence-service-instrumentation
    - section_path: 1.4.3
      role: requirement
      confidence: high
      summary: 'FR-019 through FR-021: AuditResult gains MostAccessed field; top-10 by AccessCount excluding zero-count docs; Most Accessed Documents Markdown table in audit output.'
      concepts_intro:
        - name: audit-report-extension
          aliases:
            - most-accessed-documents
            - audit-result-most-accessed
    - section_path: "1.5"
      role: requirement
      confidence: high
      summary: 'NFRs: counter writes non-blocking (background goroutine or deferred flush acceptable); errors silently absorbed; backward compat with zero-value absent fields; approximation acceptable; no new Go module dependencies.'
    - section_path: "1.6"
      role: requirement
      confidence: high
      summary: '21 acceptance criteria, one per FR, covering: zero-value defaults, increment behaviour on Get/List/GetOutline/guide/GetSection/find/Search, error isolation, YAML backward compat, MostAccessed list content and table rendering.'
