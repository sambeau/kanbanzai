classifications:
    - section_path: "1"
      role: narrative
      confidence: high
      summary: Specification for SQLite-backed storage and BM25 full-text search for the doc_intel system, replacing flat YAML graph queries and introducing a new search action.
      concepts_intro:
        - name: sqlite-backed-storage
          aliases:
            - sqlite-index
            - docint-db
        - name: bm25-full-text-search
          aliases:
            - fts5-search
            - full-text-search
        - name: dual-write-strategy
          aliases:
            - yaml-source-of-truth
            - derived-index
        - name: doc-intel
          aliases:
            - document-intelligence
            - document-intelligence-subsystem
    - section_path: "1.1"
      role: narrative
      confidence: high
      summary: SQLite replaces flat YAML graph file for edge and entity reference queries; FTS5 virtual table powers a new search action; per-document YAML files remain source of truth.
    - section_path: "1.2"
      role: constraint
      confidence: high
    - section_path: 1.2.1
      role: constraint
      confidence: high
      summary: Includes SQLite lifecycle, FTS5 virtual table, search action, graph edges and entity refs tables, dual-write strategy, rebuild-index command, and .gitignore update.
    - section_path: 1.2.2
      role: constraint
      confidence: high
      summary: Excludes classification data in SQLite, concept registry, semantic/embedding search, and changes to existing doc_intel actions.
    - section_path: "1.3"
      role: requirement
      confidence: high
    - section_path: 1.3.1
      role: requirement
      confidence: high
      summary: SQLite database at .kbz/index/docint.db with lazy init, WAL mode, single persistent connection, gitignore entry, and auto-schema creation.
      concepts_intro:
        - name: wal-mode
          aliases:
            - write-ahead-logging
            - journal-mode-wal
        - name: lazy-initialisation
          aliases:
            - on-demand-creation
    - section_path: 1.3.2
      role: requirement
      confidence: high
      summary: FTS5 virtual table sections_fts with document_id and section_path as UNINDEXED columns, searchable title and content, Porter+unicode61 tokeniser.
      concepts_intro:
        - name: fts5-virtual-table
          aliases:
            - sections-fts
            - fts5-table
        - name: porter-stemming
          aliases:
            - porter-tokeniser
            - unicode61-tokeniser
    - section_path: 1.3.3
      role: requirement
      confidence: high
      summary: New search action on doc_intel with query, mode (outline/summary/full), limit, doc_type, and role parameters; BM25 ranked results with post-filtering.
      concepts_intro:
        - name: search-action
          aliases:
            - doc-intel-search
        - name: post-filter
          aliases:
            - post-filtering
            - doc-type-filter
            - role-filter
    - section_path: 1.3.4
      role: requirement
      confidence: high
      summary: Edges table with from_id, from_type, to_id, to_type, edge_type columns; indexes on (from_id,from_type), (to_id,to_type), (edge_type); atomic replacement on re-ingest; dual-write with graph.yaml.
      concepts_intro:
        - name: graph-edges-table
          aliases:
            - edges-table
            - sqlite-edges
    - section_path: 1.3.5
      role: requirement
      confidence: high
      summary: Entity_refs table with entity_id, entity_type, document_id, section_path; indexes on entity_id and document_id; replaced on re-ingest.
      concepts_intro:
        - name: entity-refs-table
          aliases:
            - entity-references-table
            - sqlite-entity-refs
    - section_path: 1.3.6
      role: requirement
      confidence: high
      summary: FindByEntity queries entity_refs SQLite table; GetImpact queries edges SQLite table; TraceEntity uses entity_refs for lookup — all migrated away from YAML scanning.
      concepts_intro:
        - name: query-migration
          aliases:
            - yaml-to-sqlite-migration
    - section_path: 1.3.7
      role: requirement
      confidence: high
      summary: rebuild-index CLI command reads all YAML index files, deletes existing SQLite DB, creates fresh DB with all tables populated, reports progress counts.
      concepts_intro:
        - name: rebuild-index
          aliases:
            - index-rebuild-command
            - full-reindex
    - section_path: "1.4"
      role: requirement
      confidence: high
      summary: 'Performance NFRs: search <10ms, entity/impact queries <5ms, rebuild <5s, DB <10MB, incremental re-ingest <50ms, existing actions unchanged.'
    - section_path: "1.5"
      role: requirement
      confidence: high
    - section_path: 1.5.1
      role: requirement
      confidence: high
      summary: 'Integration criteria: search with ranking, filtered search, fast find/impact after migration, rebuild restores functionality, DB not tracked in git, all existing tests pass.'
    - section_path: "1.6"
      role: assumption
      confidence: high
    - section_path: 1.6.1
      role: narrative
      confidence: high
      summary: 'Dependencies: modernc.org/sqlite pure-Go driver, FTS5 extension, lightweight Markdown-to-text conversion for FTS indexing.'
    - section_path: 1.6.2
      role: assumption
      confidence: high
      summary: YAML files remain source of truth; graph.yaml continues to be written for backward compatibility; Porter stemming assumed adequate; SQLite is a derived performance index.
