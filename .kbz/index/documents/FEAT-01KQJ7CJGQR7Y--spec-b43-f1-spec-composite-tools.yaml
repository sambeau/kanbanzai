classifications:
    - section_path: "1.1"
      role: rationale
      confidence: high
      summary: 'Problem statement: chat agents must chain multiple atomic MCP tool calls for common workflows; the correct sequence exists in stage bindings and gate logic but is delivered as prose. This spec defines five composite actions that collapse multi-step sequences into single server-side operations'
      concepts_intro:
        - composite-tools
        - workflow-chaining
        - MCP-server
      concepts_used:
        - specification
        - atomic-tools
        - deterministic-orchestration
    - section_path: "1.2"
      role: requirement
      confidence: high
      summary: 'Requirements section: 22 functional requirements (REQ-001 through REQ-022) and 4 non-functional requirements (REQ-NF-001 through REQ-NF-004) covering all five composite actions, structural constraints, and performance thresholds'
    - section_path: 1.2.1
      role: requirement
      confidence: high
      summary: 'Functional requirements REQ-001 through REQ-022: doc publish, entity bootstrap, entity close-out, develop dispatch, batch snapshot, plus structural requirements for side-effect preservation, synchronous execution, and atomic step semantics'
    - section_path: 1.2.2
      role: requirement
      confidence: high
      summary: 'Non-functional requirements: tool call reduction ≥50%, response time ≤2× individual operations, structured next_action schema, backward compatibility for existing actions'
    - section_path: "1.3"
      role: constraint
      confidence: high
      summary: 'Constraints: backward compatibility, no new state machines, no AI/LLM calls, human gates are hard stops, must follow DispatchAction pattern, constrained by DP-9/DP-5/DP-10 from Skills System Redesign'
    - section_path: "1.4"
      role: requirement
      confidence: high
      summary: 'Acceptance criteria AC-001 through AC-015: one criterion per key behavioural assertion, each mapped to requirement IDs, using Given/When/Then format with testable observable outcomes'
    - section_path: "1.5"
      role: narrative
      confidence: high
      summary: 'Verification plan: maps each acceptance criterion to a verification method (automated test or code inspection), with brief description of the verification approach'
