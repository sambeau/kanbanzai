classifications:
    - section_path: "1"
      role: narrative
      confidence: high
      summary: Specification for concept alias resolution in doc_intel, enabling FindConcept to resolve queries against canonical names and aliases.
      concepts_intro:
        - name: concept-alias-resolution
          aliases:
            - alias-resolution
            - concept-alias
        - name: concept-registry
          aliases:
            - ConceptRegistry
            - concept-store
        - name: find-concept
          aliases:
            - FindConcept
            - concept-lookup
    - section_path: "1.1"
      role: rationale
      confidence: high
      summary: Completes the unused Concept.Aliases field by enabling alias declaration in concepts_intro and alias-aware FindConcept resolution.
      concepts_intro:
        - name: canonical-concept-name
          aliases:
            - canonical-name
            - concept-canonical
    - section_path: "1.2"
      role: constraint
      confidence: high
    - section_path: 1.2.1
      role: constraint
      confidence: high
      summary: 'In scope: extended concepts_intro format, alias storage in Concept struct, FindConcept alias resolution, alias normalisation, accumulation, backward compatibility.'
    - section_path: 1.2.2
      role: constraint
      confidence: high
      summary: 'Out of scope: alias removal/editing, aliases on concepts_used, indexing structures, UI changes, changes to concepts_used parsing.'
    - section_path: "1.3"
      role: requirement
      confidence: high
    - section_path: 1.3.1
      role: requirement
      confidence: high
      summary: concepts_intro accepts plain string (no aliases) or object with required name and optional aliases list; both forms may appear in the same list.
      concepts_intro:
        - name: extended-concepts-intro-format
          aliases:
            - concepts-intro-object-form
            - concepts-intro-extended
    - section_path: 1.3.2
      role: requirement
      confidence: high
      summary: Plain string concepts_intro must process identically to current behaviour; no migration of existing classification data required.
    - section_path: 1.3.3
      role: requirement
      confidence: high
      summary: 'Aliases normalised using NormalizeConcept: lowercase, spaces/underscores→hyphens, consecutive hyphens collapsed.'
      concepts_intro:
        - name: alias-normalisation
          aliases:
            - NormalizeConcept
            - concept-normalisation
    - section_path: 1.3.4
      role: requirement
      confidence: high
      summary: Aliases stored in Concept.Aliases field after normalisation; canonical name must not appear in Aliases list.
    - section_path: 1.3.5
      role: requirement
      confidence: high
      summary: Aliases deduplicated by normalised form across same and separate classifications.
      concepts_intro:
        - name: alias-deduplication
          aliases:
            - alias-uniqueness
    - section_path: 1.3.6
      role: requirement
      confidence: high
      summary: Aliases from later classifications merged with existing aliases; multi-agent alias accumulation retains all unique aliases.
      concepts_intro:
        - name: alias-accumulation
          aliases:
            - alias-merging
            - multi-agent-alias-accumulation
    - section_path: 1.3.7
      role: requirement
      confidence: high
      summary: FindConcept first matches canonical names after normalisation; canonical match returned immediately (existing behaviour preserved).
    - section_path: 1.3.8
      role: requirement
      confidence: high
      summary: If no canonical match, FindConcept scans all concepts alias lists for normalised match and returns the owning concept.
    - section_path: 1.3.9
      role: requirement
      confidence: high
      summary: Canonical name always takes priority over alias match when the same string matches both.
    - section_path: 1.3.10
      role: requirement
      confidence: high
      summary: FindConcept returns pointer to registry entry for in-place mutation; existing API contract unchanged.
    - section_path: 1.3.11
      role: requirement
      confidence: high
      summary: UpdateConceptRegistry extracts aliases from object-form entries and populates Concept.Aliases; plain-string entries do not modify Aliases field.
    - section_path: "1.4"
      role: requirement
      confidence: high
    - section_path: 1.4.1
      role: requirement
      confidence: high
      summary: Alias resolution uses linear scan; no additional data structures beyond Concept.Aliases slice; registry expected at most a few hundred entries.
    - section_path: 1.4.2
      role: requirement
      confidence: high
      summary: No YAML schema migration required; Classification struct serialised form remains compatible with existing YAML files.
    - section_path: "1.5"
      role: requirement
      confidence: high
      summary: 'Integration-level criteria: end-to-end alias flow, mixed format classification, multi-agent accumulation, all existing tests pass.'
